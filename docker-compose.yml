services:
  opensearch:
    image: opensearchproject/opensearch:latest
    container_name: opensearch-chemlabs
    environment:
      - discovery.type=single-node
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_PASSWORD:-C#emlabs2026!}
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - cluster.routing.allocation.disk.threshold_enabled=false
      - cluster.blocks.create_index=false
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    networks:
      - opensearch-net
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2G

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:latest
    container_name: opensearch-dashboards-chemlabs
    environment:
      - OPENSEARCH_HOSTS=["https://opensearch:9200"]
      - opensearch.username=${OPENSEARCH_USER:-admin}
      - opensearch.password=${OPENSEARCH_PASSWORD:-C#emlabs2026!}
      - opensearch.ssl.verificationMode=none
    ports:
      - "5601:5601"
    depends_on:
      - opensearch
    networks:
      - opensearch-net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 1G

  rag:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: chemlabs-rag
    env_file:
      - .env
    ports:
      - "5000:5000"
    environment:
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
      - OPENSEARCH_USER=${OPENSEARCH_USER:-admin}
      - OPENSEARCH_PASSWORD=${OPENSEARCH_PASSWORD:-C#emlabs2026!}
    volumes:
      - ./data:/app/data:ro
    depends_on:
      - opensearch
    networks:
      - opensearch-net
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 6G

volumes:
  opensearch-data:

networks:
  opensearch-net:
